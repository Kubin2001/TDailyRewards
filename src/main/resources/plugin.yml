name: TDailyRewards
version: '1.3.4'
main: TribeDailyRewards.tribeDailyRewards.TDailyRewards
api-version: '1.21'

commands:
  reward:
    usage: /<command>
    description: Can be used to get yours daily reward
    permission: tDailyRewards.reward

  setRewardLevel:
    usage: /<command> <player> <val>
    description: Set player reward level to certain value
    permission: tDailyRewards.admin

  resetRewardTimer:
    usage: /<command> <player>
    description: Set player reward timer to now
    permission: tDailyRewards.admin

  rewardInfo:
    usage: /<command> <player>
    description: Show info panel about player reward stats
    permission: tDailyRewards.admin

  moveReward:
    usage: /<command> <player>
    description: Move player reward time by x hours
    permission: tDailyRewards.admin

  reload:
    usage: /<command>
    description: Reloads main config
    permission: tDailyRewards.reload

  reloadItems:
    usage: /<command>
    description: Reloads items Config
    permission: tDailyRewards.reloadItems
